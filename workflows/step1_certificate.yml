# ============================================================
# ADIM 1: SERTİFİKA KURULUM TESTİ
# ============================================================
# Bu workflow sadece şunu test eder:
#   - P12 sertifikası base64'ten doğru çözülüyor mu?
#   - macOS Keychain'e başarıyla import ediliyor mu?
#   - codesign aracı sertifikayı görüyor mu?
#
# Başarılı olursa: Adım 2'ye geç
# Başarısız olursa: Sertifika base64'ü veya şifresi yanlış demektir
# ============================================================

name: "Adım 1 — Sertifika Testi"

on:
  workflow_dispatch:
    # Manuel tetikleme — GitHub repo sayfasında
    # Actions > "Adım 1 — Sertifika Testi" > "Run workflow" butonuna bas

jobs:
  test-certificate:
    name: "Sertifikayı Keychain'e Yükle ve Doğrula"
    runs-on: macos-latest  # GitHub'ın ücretsiz macOS sanal makinesi

    steps:

      # ----------------------------------------------------------
      # 1. Repoyu indir
      # ----------------------------------------------------------
      - name: "Repoyu Klonla"
        uses: actions/checkout@v4
        # Bu adım olmadan dosyalarına erişemezsin

      # ----------------------------------------------------------
      # 2. P12 dosyasını GitHub Secret'tan oku ve diske yaz
      # ----------------------------------------------------------
      - name: "P12 Sertifikasını Diske Yaz"
        env:
          # GitHub repo → Settings → Secrets → CERTIFICATE_P12
          # İçerik: `base64 -i sertifika.p12` komutunun çıktısı
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
        run: |
          echo "📦 Base64 sertifikayı çözüyorum..."

          # Base64 stringi tekrar .p12 dosyasına dönüştür
          # --decode: base64'ü binary'e çevir
          # > certificate.p12: geçici dosyaya yaz
          echo "$CERTIFICATE_P12" | base64 --decode > certificate.p12

          # Dosyanın oluştuğunu doğrula (boyutu 0 ise hata var demektir)
          if [ ! -s certificate.p12 ]; then
            echo "❌ HATA: certificate.p12 oluşmadı veya boş!"
            echo "   Çözüm: CERTIFICATE_P12 secret'ını kontrol et"
            exit 1
          fi

          echo "✅ P12 dosyası başarıyla oluşturuldu ($(du -h certificate.p12 | cut -f1))"

      # ----------------------------------------------------------
      # 3. Geçici bir Keychain oluştur
      # ----------------------------------------------------------
      - name: "Geçici Keychain Oluştur"
        run: |
          echo "🔐 Geçici keychain oluşturuluyor..."

          # 'build.keychain' adında yeni bir keychain oluştur
          # -p "": keychain şifresi (CI ortamında boş bırakılır)
          security create-keychain -p "" build.keychain

          # Bu keychain'i sistem keychain listesine ekle
          # Olmadan codesign göremez
          security list-keychains -s build.keychain

          # Varsayılan keychain olarak ayarla
          security default-keychain -s build.keychain

          # Keychain'i kilitsiz bırak (CI'da her adımda kilit açılmasın)
          security unlock-keychain -p "" build.keychain

          # Keychain'in otomatik kilitlenmesini kapat
          # Aksi halde uzun build'lerde kilitlenip imzalama başarısız olur
          security set-keychain-settings build.keychain

          echo "✅ Keychain hazır"

      # ----------------------------------------------------------
      # 4. Sertifikayı Keychain'e import et
      # ----------------------------------------------------------
      - name: "Sertifikayı Keychain'e Import Et"
        env:
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          # GitHub repo → Settings → Secrets → CERTIFICATE_PASSWORD
          # P12 dosyasını export ederken girdiğin şifre
        run: |
          echo "🔑 Sertifika import ediliyor..."

          security import certificate.p12 \
            -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild
          # -k: hangi keychain'e yüklenecek
          # -P: P12 dosyasının şifresi
          # -T /usr/bin/codesign: codesign aracının bu sertifikaya erişimine izin ver
          # -T /usr/bin/xcodebuild: xcodebuild'in erişimine de izin ver

          # codesign'ın şifre sormadan erişebilmesi için partition listesi ayarla
          # Bu olmadan "User interaction is not allowed" hatası alırsın
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "" build.keychain

          echo "✅ Sertifika import edildi"

      # ----------------------------------------------------------
      # 5. Sertifikanın gerçekten yüklendiğini doğrula
      # ----------------------------------------------------------
      - name: "Sertifikayı Doğrula"
        run: |
          echo "🔍 Yüklü sertifikalar listeleniyor..."

          # Keychain'deki tüm sertifikaları listele
          security find-identity -v -p codesigning build.keychain

          # Çıktıda "iPhone Distribution" veya "Apple Distribution" görünmeli
          # Görünmüyorsa: yanlış sertifika tipi yüklenmiş demektir
          # App Store için "Distribution" sertifikası gerekir, "Development" değil!

          CERT_COUNT=$(security find-identity -v -p codesigning build.keychain | grep -c "valid")

          if [ "$CERT_COUNT" -eq 0 ]; then
            echo "❌ HATA: Geçerli imzalama sertifikası bulunamadı!"
            echo "   Çözüm: 'Distribution' tipinde sertifika yüklediğinden emin ol"
            exit 1
          fi

          echo "✅ $CERT_COUNT geçerli sertifika bulundu"
          echo ""
          echo "🎉 ADIM 1 BAŞARILI! Adım 2'ye geçebilirsin."
