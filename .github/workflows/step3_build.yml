# ============================================================
# ADIM 3: FLUTTER IPA BUILD TESTİ
# ============================================================
name: "Adım 3 — Build Testi"

on: 
  workflow_dispatch:
    inputs:
      flutter_version:
        description: "Flutter sürümü (Boş bırakırsan son stable sürüm kullanılır)"
        required: false
        default: ""

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: "Repoyu Klonla"
        uses: actions/checkout@v4

      # ----------------------------------------------------------
      # 1. Sertifika Kurulumu
      # ----------------------------------------------------------
      - name: "Sertifika ve Keychain Hazırla"
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERTIFICATE_P12" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings build.keychain
          security import certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          echo "✅ Sertifika Keychain'e eklendi."

      # ----------------------------------------------------------
      # 2. Provisioning Profile Kurulumu
      # ----------------------------------------------------------
      - name: "Provisioning Profile'ı Yerleştir"
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
          echo "✅ Provisioning Profile hazır."

      # ----------------------------------------------------------
      # 3. Flutter ve Bağımlılıklar
      # ----------------------------------------------------------
      - name: "Flutter Kur"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ github.event.inputs.flutter_version }}
          channel: 'stable'
          cache: true

      - name: "Bağımlılıkları Yükle (pub & pod)"
        run: |
          flutter pub get
          cd ios
          pod install --repo-update
          cd ..
          echo "✅ Tüm bağımlılıklar hazır."

      # ----------------------------------------------------------
      # 4. İmzalamayı Tamamen Manuel ve Zorunlu Yap
      # ----------------------------------------------------------
      - name: "Xcode Proje Dosyasını İmzalamaya Zorla"
        run: |
          PROJ_PATH="ios/Runner.xcodeproj/project.pbxproj"
          
          # 1. Otomatik imzalamayı kapat
          sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' "$PROJ_PATH"
          
          # 2. Tüm hedeflere Team ID'yi işle
          sed -i '' 's/DevelopmentTeam = [A-Z0-9]*;/DevelopmentTeam = 76J8JGV82N;/g' "$PROJ_PATH"
          
          # 3. Xcode'a hangi profili kullanacağını açıkça söyle (Specifier)
          # 'flutter_01' portaldaki profil ismin olduğu için buraya onu giriyoruz
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = ".*";/PROVISIONING_PROFILE_SPECIFIER = "flutter_01";/g' "$PROJ_PATH"
          sed -i '' '/PROVISIONING_PROFILE_SPECIFIER/! s/SDKROOT = iphoneos;/SDKROOT = iphoneos;\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = "flutter_01";/g' "$PROJ_PATH"

          # 4. Dağıtım sertifikası tipini belirle
          sed -i '' 's/CODE_SIGN_IDENTITY = ".*";/CODE_SIGN_IDENTITY = "Apple Distribution";/g' "$PROJ_PATH"
          
          echo "✅ Xcode projesi 'flutter_01' profili için zorlandı."

      # ----------------------------------------------------------
      # 5. IPA Build Alımı
      # ----------------------------------------------------------
      - name: "IPA Build Al"
        run: |
          echo "🔨 Build başlıyor..."
          # --no-codesign yapmıyoruz, çünkü imzalı IPA istiyoruz.
          # Ancak manuel imzalamayı Flutter seviyesinde de teyit ediyoruz.
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist \
            --build-number=$GITHUB_RUN_NUMBER \
            --codesign
          echo "✅ Build başarıyla tamamlandı!"

      # ----------------------------------------------------------
      # 6. Sonucu Kaydet (Artifact)
      # ----------------------------------------------------------
      - name: "Üretilen IPA'yı Kaydet"
        uses: actions/upload-artifact@v4
        with:
          name: bir-bakista-release-ipa
          path: build/ios/ipa/*.ipa
          retention-days: 5
