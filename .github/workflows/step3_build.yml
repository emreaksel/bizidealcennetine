# ============================================================
# ADIM 3: FLUTTER IPA BUILD TESTİ
# ============================================================
name: "Adım 3 — Build Testi"

on: 
  workflow_dispatch:
    inputs:
      flutter_version:
        description: "Flutter sürümü (Boş bırakırsan son stable sürüm kullanılır)"
        required: false
        default: ""

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: "Repoyu Klonla"
        uses: actions/checkout@v4

      # ----------------------------------------------------------
      # 1. Sertifika Kurulumu
      # ----------------------------------------------------------
      - name: "Sertifika ve Keychain Hazırla"
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERTIFICATE_P12" | base64 --decode > certificate.p12
          security create-keychain -p "temp_pass" build.keychain
          security list-keychains -s build.keychain login.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "temp_pass" build.keychain
          security set-keychain-settings -t 3600 -l build.keychain
          security import certificate.p12 \
            -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "temp_pass" build.keychain

          # ✅ Sertifikanın gerçekten yüklenip yüklenmediğini kontrol et
          echo "=== Keychain'deki sertifikalar ==="
          security find-identity -v -p codesigning build.keychain
          echo "✅ Sertifika Keychain'e eklendi."

      # ----------------------------------------------------------
      # 2. Provisioning Profile Kurulumu
      # ----------------------------------------------------------
      - name: "Provisioning Profile'ı Yerleştir"
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/flutter_01.mobileprovision

          # ✅ Profil UUID ve adını doğrula
          echo "=== Profil bilgisi ==="
          security cms -D -i \
            ~/Library/MobileDevice/Provisioning\ Profiles/flutter_01.mobileprovision \
            | grep -A1 -e "UUID" -e "Name" -e "TeamIdentifier" | head -20
          echo "✅ Provisioning Profile hazır."

      # ----------------------------------------------------------
      # 3. Flutter ve Bağımlılıklar
      # ----------------------------------------------------------
      - name: "Flutter Kur"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ github.event.inputs.flutter_version }}
          channel: 'stable'
          cache: true

      - name: "Bağımlılıkları Yükle (pub & pod)"
        run: |
          flutter pub get
          cd ios && pod install --repo-update && cd ..
          echo "✅ Tüm bağımlılıklar hazır."

      # ----------------------------------------------------------
      # 4. Xcode Projesini Manuel İmzalamaya Zorla
      # ----------------------------------------------------------
      - name: "Xcode İmzalama Ayarlarını Zorla"
        run: |
          PROJ="ios/Runner.xcodeproj/project.pbxproj"

          # Mevcut imzalama satırlarını temizle
          sed -i '' '/PROVISIONING_PROFILE[^_]/d' "$PROJ"
          sed -i '' '/PROVISIONING_PROFILE_SPECIFIER/d' "$PROJ"
          sed -i '' '/CODE_SIGN_IDENTITY/d' "$PROJ"
          sed -i '' '/CODE_SIGN_STYLE/d' "$PROJ"
          sed -i '' '/ProvisioningStyle/d' "$PROJ"

          # Manuel moda zorla + Distribution sertifikası ata
          # SDKROOT satırından sonra tüm imzalama ayarlarını ekle
          sed -i '' 's/SDKROOT = iphoneos;/SDKROOT = iphoneos;\n\t\t\t\tCODE_SIGN_IDENTITY = "Apple Distribution";\n\t\t\t\tCODE_SIGN_STYLE = Manual;\n\t\t\t\tDEVELOPMENT_TEAM = 76J8JGV82N;\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = "flutter_01";/g' "$PROJ"

          # ProvisioningStyle'ı pbxproj'un PBXProject bölümüne de yaz
          sed -i '' 's/attributes = {/attributes = {\n\t\t\t\tTargetAttributes = {\n\t\t\t\t};/g' "$PROJ" 2>/dev/null || true

          echo "✅ İmzalama ayarları tamamlandı."
          echo "=== CODE_SIGN kontrol ==="
          grep -E "CODE_SIGN|PROVISIONING|DEVELOPMENT_TEAM|ProvisioningStyle" "$PROJ" | head -30

      # ----------------------------------------------------------
      # 5. IPA Build Alımı (xcodebuild flag'leriyle override)
      # ----------------------------------------------------------
      - name: "IPA Build Al"
        run: |
          echo "🔨 Build başlıyor..."
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist \
            --build-number=$GITHUB_RUN_NUMBER \
            --dart-define=FLUTTER_BUILD_NAME=1.0.0 \
            --no-codesign \
            || true

          # flutter build ipa --no-codesign başarısız olursa
          # direkt xcodebuild ile archive + export yap
          if [ ! -f build/ios/ipa/*.ipa ]; then
            echo "⚠️ flutter build ipa başarısız, xcodebuild ile deneniyor..."
            
            xcodebuild archive \
              -workspace ios/Runner.xcworkspace \
              -scheme Runner \
              -configuration Release \
              -archivePath build/ios/Runner.xcarchive \
              CODE_SIGN_STYLE=Manual \
              CODE_SIGN_IDENTITY="Apple Distribution" \
              PROVISIONING_PROFILE_SPECIFIER="flutter_01" \
              DEVELOPMENT_TEAM=76J8JGV82N \
              -allowProvisioningUpdates \
              | xcpretty

            xcodebuild -exportArchive \
              -archivePath build/ios/Runner.xcarchive \
              -exportOptionsPlist ios/ExportOptions.plist \
              -exportPath build/ios/ipa \
              | xcpretty
          fi

          echo "✅ Build tamamlandı!"
          ls -la build/ios/ipa/ || echo "⚠️ IPA bulunamadı"

      # ----------------------------------------------------------
      # 6. Sonucu Kaydet (Artifact)
      # ----------------------------------------------------------
      - name: "Üretilen IPA'yı Kaydet"
        uses: actions/upload-artifact@v4
        with:
          name: bir-bakista-release-ipa
          path: build/ios/ipa/*.ipa
          retention-days: 5
